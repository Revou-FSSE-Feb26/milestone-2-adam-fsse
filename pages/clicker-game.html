<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clicker Game</title>

    <link rel="stylesheet" href="../css/base.css">
    <script defer src="../js/clicker-game.js"></script>

</head>
<body>
    <header>
        <h1>Clicker Game</h1>
        <nav>
            <a id="clicker-link" href="../pages/clicker-game.html">Clicker Game</a>
            <a id="guessing-link" href="../pages/number-guessing-game.html">Number Guessing Game</a>
            <a id="rps-link" href="../pages/rock-paper-scissors.html">Rock Paper Scissors</a>
        </nav>
    </header>

    <main>
        <p>Click the button as many times as you can in 10 seconds!</p>
        <button id="click-btn" class="click-button">Click Me!</button>
        <p id="score-display">Score: <span id="score-text">0</span></p>
        <p id="timer-display">Time Left: <span id="timer-text">10</span>s</p>
        <p id="high-score"></p>
        <button id="restart-btn" class="reset-button btn-hidden">Restart Game</button>

        <a id="back-btn" href="../index.html"><button class="back-button">← Back to Main Menu</button></a>
    </main>

    <footer>
        <p>&copy; 2026 RevoFun by Adam.</p>
    </footer>
</body>
</html>
