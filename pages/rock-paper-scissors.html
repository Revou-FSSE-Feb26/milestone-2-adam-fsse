<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/rock-paper-scissors.css">
    <script defer src="../js/rock-paper-scissors.js"></script>
</head>
<body>
    <header>
        <h1>Rock Paper Scissors</h1>
        <nav>
            <a id="clicker-link" href="../pages/clicker-game.html">Clicker Game</a>
            <a id="guessing-link" href="../pages/number-guessing-game.html">Number Guessing Game</a>
            <a id="rps-link" href="../pages/rock-paper-scissors.html">Rock Paper Scissors</a>
        </nav>
    </header>

    <main>
        <p>Play a Game of Rock Paper Scissors!</p>
        <img id="random-image" src="../assets/img/rock.png" alt="Flickering Image">

        <div id="choices">
            <button id="rock-btn" class="click-button"><img src="../assets/img/rock.png" alt="Rock"></button>
            <button id="paper-btn" class="click-button"><img src="../assets/img/paper.png" alt="Paper"></button>
            <button id="scissors-btn" class="click-button"><img src="../assets/img/scissors.png" alt="Scissors"></button>
        </div>

        <p id="message"></p>
        <button id="reset-btn" class="reset-button btn-hidden">Play Again</button>
        
        <a id="back-btn" href="../index.html"><button class="back-button">← Back to Main Menu</button></a>
    </main>
    
    <footer>
        <p>&copy; 2026 RevoFun by Adam.</p>
    </footer>
    
</body>
</html>
