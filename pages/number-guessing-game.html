<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Guessing Game</title>
    
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/number-guessing-game.css">
    <script defer src="../js/number-guessing-game.js"></script>
</head>
<body>
    <header>
        <h1>Number Guessing Game</h1>
        <nav>
            <a id="clicker-link" href="../pages/clicker-game.html">Clicker Game</a>
            <a id="guessing-link" href="../pages/number-guessing-game.html">Number Guessing Game</a>
            <a id="rps-link" href="../pages/rock-paper-scissors.html">Rock Paper Scissors</a>
        </nav>
    </header>

    <main>
        <p>Guess the number between 1 and 100.</p>

        <input type="number" id="guessInput" placeholder="Enter number">
        <br />
        <button id="guess-btn" class="click-button">Guess</button>
        <p>Attempts left: <span id="attempts">5</span></p>
    
        <p id="message"></p>
        <button id="reset-btn" class="reset-button btn-hidden">Play Again</button>

        <a id="back-btn" href="../index.html"><button class="back-button">← Back to Main Menu</button></a>
    </main>
    
    <footer>
        <p>&copy; 2026 RevoFun by Adam.</p>
    </footer>
</body>
</html>
