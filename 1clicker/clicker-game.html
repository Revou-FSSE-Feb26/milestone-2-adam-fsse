<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clicker Game</title>

    <link rel="stylesheet" href="../css/base.css">
    <script defer src="clicker-game.js"></script>

</head>
<body>
    <header>
        <h1>Clicker Game</h1>
    </header>

    <main>
        <p>Click the button as many times as you can in 10 seconds!</p>
        <button id="click-btn" class="click-button">Click Me!</button>
        <p id="score-display">Score: <span id="score-text">0</span></p>
        <p id="timer-display">Time Left: <span id="timer-text">10</span>s</p>
        <button id="restart-btn" class="reset-button">Restart Game</button>
    </main>

    <footer>
        <a href="../index.html"><button class="back-button">← Back to Main Menu</button></a>
    </footer>
</body>
</html>
