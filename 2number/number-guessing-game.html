<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Guessing Game</title>
    
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/number-guessing-game.css">
    <script defer src="number-guessing-game.js"></script>
</head>
<body>
    <header>
    <h1>Number Guessing Game</h1>
    </header>

    <main>
        <p>Guess the number between 1 and 100.</p>

        <input type="number" id="guessInput" placeholder="Enter number">
        <br />
        <button onclick="checkGuess()" id="submitBtn" class="click-button">Guess</button>
        <p>Attempts left: <span id="attempts">5</span></p>
    
        <p id="message"></p>
        <button onclick="resetGame()" id="resetBtn" style="display:none;">Play Again</button>
    </main>
    
    <footer>
        <a href="../index.html"><button class="back-button">← Back to Main Menu</button></a>
    </footer>
</body>
</html>
